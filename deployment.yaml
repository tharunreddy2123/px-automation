apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
  namespace: tharunreddy-dev

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx-app

  template:
    metadata:
      labels:
        app: nginx-app

    spec:
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.27.0

        ports:
        - containerPort: 8080